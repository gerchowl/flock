# guardrails-ok(ci-shim): host-bound: cargo-nextest with zig 0.15 + macos-15 SDK constraints; follow-up tracks folding into `nix flake check` (checks.gates already covers the gates)
name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
    paths-ignore:
      - "website/**"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  conventional-commits:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate commit subjects
        if: github.event_name == 'push'
        run: python3 scripts/conventional_commits.py --range "${{ github.event.before }}..${{ github.event.after }}"

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        run: python3 scripts/conventional_commits.py "${{ github.event.pull_request.title }}"

  check:
    name: check (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            nextest_filter: all()
          # Pinned to macos-15, NOT macos-latest: GitHub rotated macos-latest to
          # the macOS 26 ("Tahoe") image, whose SDK the vendored libghostty-vt
          # zig 0.15.2 build can't link against (undefined libSystem symbols like
          # __availability_version_check). macos-15 is the last image this
          # toolchain builds on. Revisit when zig gains macOS 26 SDK support.
          - os: macos-15
            nextest_filter: not binary(live_handoff)
    runs-on: ${{ matrix.os }}
    # Serializing the heavy multi-process PTY suites (see .config/nextest.toml)
    # adds wall-clock; give the job headroom over the previous 10-minute cap.
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: just,cargo-nextest

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.15.2

      - name: Install macOS build tools
        if: runner.os == 'macOS'
        run: brew install cmake ninja

      - name: Restore cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-bin: false

      - name: Run checks
        run: just ci '${{ matrix.nextest_filter }}'
